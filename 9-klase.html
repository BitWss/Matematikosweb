<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>9 klasė</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #2c3e50;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      color: #1a252f;
      letter-spacing: 0.03em;
    }
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #95a5a6;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 28px;
      font-size: 0.88rem;
      color: #2980b9;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .back-link:hover { text-decoration: underline; }
    .section {
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      margin-bottom: 32px;
      overflow: visible;
    }
    .section-header {
      background: transparent;
      color: #1a252f;
      border-bottom: 2px solid #e0e6ed;
      padding: 12px 0;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
    }
    .section-header:hover { color: #2980b9; border-color: #2980b9; }
    .section-header .arrow { transition: transform 0.3s; font-size: 0.75rem; opacity: 0.5; color: #95a5a6; }
    .section-header.open .arrow { transform: rotate(180deg); }
    .section-body { display: none; padding: 16px 0; gap: 16px; flex-direction: column; }
    .section-body.open { display: flex; }
    .pdf-item { border: none; border-radius: 0; overflow: visible; }
    .pdf-label {
      background: transparent;
      border: none;
      padding: 10px 0;
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.02em;
      color: #2c3e50;
      transition: color 0.2s;
    }
    .pdf-label {
      cursor: pointer;
      user-select: none;
    }
    .pdf-label:hover { color: #2980b9; }
    .pdf-label-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .pdf-label a { font-size: 0.82rem; color: #2980b9; text-decoration: none; font-weight: 400; }
    .pdf-label a:hover { text-decoration: underline; }
    .pdf-arrow { font-size: 0.7rem; opacity: 0.5; transition: transform 0.3s; }
    .pdf-arrow.open { transform: rotate(180deg); }
    .pdf-collapse { display: none; }
    .pdf-collapse.open { display: block; }
    iframe.pdf-viewer { width: 100%; height: 600px; border: none; display: block; }
  </style>
</head>
<body>

  <a class="back-link" href="index.html">&larr; Grįžti į pradžią</a>
  <h1>9 klasė</h1>
  <p class="subtitle">Pasirinkite temą</p>


  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      Mokymosi planas TEV
      <span class="arrow">&#9660;</span>
    </div>
    <div class="section-body">

      <div class="pdf-item">
        <div class="pdf-label" onclick="togglePdf(this)">
          <span>mokymo(si) ilgalaikis planas 9kl</span>
          <div class="pdf-label-actions">
            <a href="pdfs/9 klasė/Mokymosi planas TEV/mokymo(si)_ilgalaikis_planas_9kl.pdf" target="_blank" onclick="event.stopPropagation()">Atsisiųsti</a>
            <span class="pdf-arrow">&#9660;</span>
          </div>
        </div>
        <div class="pdf-collapse">
          <iframe class="pdf-viewer" src="pdfs/9 klasė/Mokymosi planas TEV/mokymo(si)_ilgalaikis_planas_9kl.pdf"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleSection(header) {
      header.classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    }
    function togglePdf(label) {
      const collapse = label.nextElementSibling;
      const arrow    = label.querySelector('.pdf-arrow');
      collapse.classList.toggle('open');
      arrow.classList.toggle('open');
    }
  </script>

</body>
</html>
