name: Deploy to InfinityFree via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate HTML files
        run: python gen.py

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_TARGET_FOLDER }}
          security: loose
          exclude: |
            .git*
            .git*/**
            .github/**
            .gitignore
            .ftpignore
            README.md
            *.md
            node_modules/**
            12_klasė_tex/**
            *.py
          dangerous-clean-slate: false   # optional: for one cleanup run